<button routerLink="/">Voltar</button>
<h2>Cadastro de Obra</h2>

<form (ngSubmit)="salvar()">
  <label>Título</label>
  <input type="text" [(ngModel)]="obra.titulo" name="titulo" required>

  <label>Autor</label>
  <input type="text" [(ngModel)]="obra.autor" name="autor">

  <label>Editora</label>
  <input type="text" [(ngModel)]="obra.editora" name="editora">

  <label>ISBN</label>
  <input type="text" [(ngModel)]="obra.isbn" name="isbn">

  <label>Ano</label>
  <input type="number" [(ngModel)]="obra.anoPublicacao" name="ano">

  <label>Estoque</label>
  <input type="number" [(ngModel)]="obra.estoque" name="estoque">

  <button type="submit">
    {{ id ? 'Alterar' : 'Salvar' }}
</button>

</form>
